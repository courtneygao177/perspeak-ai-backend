kind = "api"
previewPath = "/"
title = "PerspeakAI"

[[services]]
localPort = 8000
name = "PerspeakAI"
paths = ["/"]

[services.development]
run = "python app.py"

[services.production]

[services.production.run]
args = ["python", "app.py"]

[services.production.run.env]
PORT = "8000"
FLASK_ENV = "production"

[services.production.health.startup]
path = "/"
