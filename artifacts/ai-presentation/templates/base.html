<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PerspeakAI — AI Presentation Coach{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#fdf8ee',
              100: '#f7eccc',
              400: '#E6C687',
              500: '#D9A752',
              600: '#C4892A',
              700: '#A36B18',
              900: '#1A1612',
            },
            surface: {
              900: '#0D0E11',
              800: '#16181D',
              700: '#1E2028',
              600: '#22252E',
              500: '#2A2E37',
            },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'slide-up': 'slideUp 0.4s ease-out',
            'fade-in': 'fadeIn 0.5s ease-out',
          },
          keyframes: {
            slideUp: {
              from: { transform: 'translateY(20px)', opacity: 0 },
              to:   { transform: 'translateY(0)',    opacity: 1 },
            },
            fadeIn: {
              from: { opacity: 0 },
              to:   { opacity: 1 },
            },
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #0D0E11; }
    .glass {
      background: rgba(22, 24, 29, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(217, 167, 82, 0.1);
    }
    .glass-strong {
      background: rgba(18, 19, 23, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(42, 46, 55, 0.9);
    }
    .gradient-border {
      background: linear-gradient(135deg, rgba(217,167,82,0.08), rgba(230,198,135,0.04)) padding-box,
                  linear-gradient(135deg, #D9A752, #E6C687) border-box;
      border: 1px solid transparent;
    }
    .text-gradient {
      background: linear-gradient(135deg, #ffffff, #D2E4F9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .gold-gradient {
      background: linear-gradient(135deg, #D9A752, #E6C687);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0D0E11; }
    ::-webkit-scrollbar-thumb { background: #2A2E37; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #D9A752; }
    .btn-primary {
      background: linear-gradient(135deg, #C4892A, #D9A752);
      transition: all 0.2s;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #D9A752, #E6C687);
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(217,167,82,0.25);
    }
    .btn-primary:active { transform: translateY(0); }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="text-gray-100 font-sans min-h-screen" style="background-color:#0D0E11;">

  <!-- Top Nav -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass-strong border-b border-[#2A2E37]">
    <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2.5">
        <div class="w-7 h-7 rounded-lg btn-primary flex items-center justify-center text-sm font-bold text-white">P</div>
        <span class="font-semibold text-white tracking-tight">PerspeakAI</span>
        <span class="text-xs font-mono px-2 py-0.5 rounded-full border"
              style="color:#D9A752;background:rgba(217,167,82,0.08);border-color:rgba(217,167,82,0.2)">BETA</span>
      </a>
      <div class="flex items-center gap-6 text-sm text-gray-500">
        {% block nav_steps %}{% endblock %}
      </div>
    </div>
  </nav>

  <main class="pt-14">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
