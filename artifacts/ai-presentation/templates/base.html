<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PerspeakAI — AI Presentation Coach{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Design direction: "The Training Court" — speaking is a sport, train like it.
    // Off-white court, ink scoreboard, one signal orange. Mono numerals everywhere.
    if (typeof tailwind !== 'undefined') tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Brand ramps (ivy = legacy name kept so existing classes retheme in place)
            ivy: {
              50:  '#FDF3ED',
              100: '#FAE5D9',
              200: '#F3CDB9',
              300: '#EBA98A',
              400: '#E8734A',
              500: '#D9481F',
              600: '#B93C18',
              700: '#973112',
            },
            oxford: {
              900: '#191C1E',
              800: '#23272A',
              700: '#3A4045',
              600: '#4E555B',
              500: '#6B7075',
            },
            // Recalibrated core palettes: warm ink neutrals, single accent,
            // muted steel/plum/ochre for data dimensions.
            slate: {
              50: '#F6F5F0', 100: '#EEECE5', 200: '#DAD7CE', 300: '#C9C6BD',
              400: '#8A8F92', 500: '#6B7075', 600: '#4E555B', 700: '#3A4045',
              800: '#23272A', 900: '#191C1E',
            },
            gray: {
              50: '#F6F5F0', 100: '#EEECE5', 200: '#DAD7CE', 300: '#C9C6BD',
              400: '#8A8F92', 500: '#6B7075', 600: '#4E555B', 700: '#3A4045',
              800: '#23272A', 900: '#191C1E',
            },
            emerald: {
              50: '#FDF3ED', 100: '#FAE5D9', 200: '#F3CDB9', 300: '#EBA98A',
              400: '#E8734A', 500: '#D9481F', 600: '#B93C18', 700: '#973112',
              800: '#7A2A10', 900: '#5C2210',
            },
            blue: {
              50: '#F1F4F5', 100: '#E2E8EA', 200: '#C5D1D5', 300: '#9FB3BA',
              400: '#6F8C96', 500: '#46626F', 600: '#3A5260', 700: '#2F4450',
              800: '#263741', 900: '#1E2C34',
            },
            indigo: {
              50: '#F2F0F5', 100: '#E6E2EB', 200: '#CFC9D8', 300: '#B0A9BA',
              400: '#847B92', 500: '#5D5468', 600: '#4E4657', 700: '#413A49',
              800: '#363040', 900: '#2E2934',
            },
            violet: {
              50: '#F2F0F5', 100: '#E6E2EB', 200: '#CFC9D8', 300: '#B0A9BA',
              400: '#847B92', 500: '#5D5468', 600: '#4E4657', 700: '#413A49',
              800: '#363040', 900: '#2E2934',
            },
            amber: {
              50: '#FAF3E3', 100: '#F5E7CE', 200: '#EDD4A6', 300: '#E5BE7E',
              400: '#D9A24A', 500: '#C98A2D', 600: '#A87118', 700: '#8A5C13',
              800: '#6F4A10', 900: '#5A3C0D',
            },
          },
          fontFamily: {
            sans: ['"Helvetica Neue"', 'Helvetica', 'Arial', '"PingFang SC"', '"Microsoft YaHei"', 'system-ui', 'sans-serif'],
            mono: ['ui-monospace', '"SF Mono"', 'Menlo', 'Consolas', '"Liberation Mono"', 'monospace'],
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'slide-up': 'slideUp 0.4s ease-out',
            'fade-in': 'fadeIn 0.5s ease-out',
          },
          keyframes: {
            slideUp: {
              from: { transform: 'translateY(20px)', opacity: 0 },
              to:   { transform: 'translateY(0)',    opacity: 1 },
            },
            fadeIn: {
              from: { opacity: 0 },
              to:   { opacity: 1 },
            },
          },
        },
      },
    }
  </script>
  <style>
    body { background-color: #F6F5F0; color: #191C1E; }
    h1, h2, .display { letter-spacing: -0.02em; }
    /* Numbers line up like a scoreboard */
    .tabular, .font-mono { font-variant-numeric: tabular-nums; }

    /* Flat surfaces — elevation only where hierarchy needs it */
    .glass {
      background: #FFFFFF;
      border: 1px solid #DAD7CE;
      box-shadow: none;
    }
    .glass-strong {
      background: rgba(246,245,240,0.96);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid #DAD7CE;
    }
    /* Legacy hook kept, gradient retired: plain ink headline */
    .text-gradient {
      background: none;
      -webkit-text-fill-color: currentColor;
      color: #191C1E;
    }
    /* Legacy hook kept, orbs retired */
    .orb { display: none; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #EEECE5; }
    ::-webkit-scrollbar-thumb { background: #C9C6BD; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #D9481F; }

    /* Primary action: flat ink block, tactile push, no glow */
    .btn-primary {
      background: #191C1E;
      color: #F6F5F0;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    .btn-primary:hover { background: #23272A; }
    .btn-primary:active { transform: translateY(1px); }

    .scene-card {
      background: #FFFFFF;
      border: 1px solid #DAD7CE;
      border-top: 2px solid #191C1E;
      border-radius: 0.375rem;
      transition: border-color 0.15s ease;
    }
    .scene-card:hover { border-top-color: #D9481F; }

    .dropzone-aura {
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .dropzone-aura:hover, .dropzone-aura.drag-over {
      background: #FDF3ED;
      border-color: #D9481F !important;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="font-sans min-h-screen" style="background:#F6F5F0;color:#191C1E;">

  <!-- Top Nav -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass-strong border-b" style="border-color:#DAD7CE">
    <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2.5">
        <div class="w-7 h-7 flex items-center justify-center text-sm font-extrabold"
             style="background:#191C1E;color:#F6F5F0;border-radius:3px">P</div>
        <span class="font-extrabold tracking-tight uppercase" style="color:#191C1E;letter-spacing:.02em">Perspeak<span style="color:#D9481F">AI</span></span>
        <span class="text-xs font-mono px-2 py-0.5 border"
              style="color:#B93C18;background:#FDF3ED;border-color:#F3CDB9;border-radius:2px">BETA</span>
      </a>
      <div class="flex items-center gap-6 text-sm" style="color:#6B7075">
        {% block nav_steps %}{% endblock %}
      </div>
    </div>
  </nav>

  <main class="pt-14">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
